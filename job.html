<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job — OnboardingSA</title>
<meta name="description" content="Job details and how to apply, on OnboardingSA.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'%3E%3Crect x='20' y='20' width='200' height='200' rx='46' fill='%2312294D'/%3E%3Cpath d='M120 56 L160 112 L133 112 L133 168 L107 168 L107 112 L80 112 Z' fill='%23E8A33D'/%3E%3Crect x='76' y='176' width='88' height='14' rx='7' fill='%23E8A33D'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --navy:#12294D; --gold:#E8A33D; --gold-600:#C9891F;
  --bg:#F4F6FA; --card:#FFFFFF; --line:#E4E9F1; --line-2:#EEF2F8;
  --text:#16213A; --muted:#5B6B85; --tint:#F0F4FB;
  --shadow:0 1px 2px rgba(18,41,77,.06),0 6px 20px rgba(18,41,77,.06);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden}
body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);line-height:1.5}
a{color:inherit}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}
header.site{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line)}
.site .wrap{max-width:1160px;display:flex;align-items:center;justify-content:space-between;height:64px}
.brand svg{height:34px;width:auto;display:block}
.nav a{font-family:Inter;font-weight:500;font-size:15px;color:var(--muted);text-decoration:none}
.nav a:hover{color:var(--navy)}
main{padding:22px 0 60px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:Poppins;font-weight:600;font-size:14px;
  color:var(--navy);text-decoration:none;margin-bottom:16px}
.back-link:hover{text-decoration:underline}
.detail{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 30px}
.d-head{display:flex;gap:14px;align-items:flex-start}
.avatar{width:52px;height:52px;border-radius:12px;background:var(--navy);color:#fff;font-family:Poppins;
  font-weight:700;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;overflow:hidden}
.avatar.gold{background:var(--gold);color:var(--navy)}
.avatar img{width:100%;height:100%;object-fit:contain;background:#fff}
.d-head h1{font-family:Poppins;font-weight:700;font-size:26px;color:var(--navy);margin:0 0 6px;line-height:1.2}
.d-emp{font-size:15px;font-weight:600;color:var(--text)}
.d-loc{font-size:14px;color:var(--muted);margin-top:2px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 4px}
.chip{font-size:12.5px;color:var(--text);background:var(--tint);border:1px solid var(--line-2);
  border-radius:6px;padding:5px 10px;white-space:nowrap}
.close-soon{color:#B23B3B;font-weight:600}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 6px}
.apply{display:inline-flex;align-items:center;gap:8px;font-family:Poppins;font-weight:600;font-size:15px;
  background:var(--gold);color:var(--navy);border-radius:10px;padding:13px 24px;text-decoration:none}
.apply:hover{background:var(--gold-600);color:#fff}
.apply svg{width:16px;height:16px}
.share{display:inline-flex;align-items:center;gap:8px;font-family:Poppins;font-weight:600;font-size:15px;
  background:#fff;color:var(--navy);border:1px solid var(--line);border-radius:10px;padding:13px 20px;cursor:pointer}
.share:hover{border-color:var(--navy)}
.share svg{width:16px;height:16px}
.share.copied{background:var(--tint);border-color:var(--gold)}
.handoff{font-size:12.5px;color:var(--muted);margin:2px 0 20px}
.section{border-top:1px solid var(--line);padding-top:18px;margin-top:18px}
.section h4{font-family:Poppins;font-weight:600;font-size:15px;color:var(--navy);margin:0 0 8px}
.section p{margin:0;font-size:14.5px;color:var(--text);white-space:pre-line}
.section ul{margin:0;padding-left:18px}
.section li{font-size:14.5px;color:var(--text);margin-bottom:6px}
.d-foot{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--muted);margin-top:20px;flex-wrap:wrap}
.state{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
  padding:48px 28px;text-align:center;color:var(--muted)}
.state h2{font-family:Poppins;color:var(--navy);margin:0 0 8px}
.state a{color:var(--navy);font-weight:600}
@media(max-width:640px){
  .detail{padding:22px 18px}
  .d-head h1{font-size:22px}
  .actions .apply,.actions .share{flex:1 1 100%;justify-content:center}
}
footer.site{border-top:1px solid var(--line);background:#fff;padding:24px 0;font-size:13px;color:var(--muted)}
footer.site .wrap{max-width:1160px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
footer.site a{color:var(--navy);text-decoration:none;font-weight:500}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5134977183220630" crossorigin="anonymous"></script>
</head>
<body>
<header class="site">
  <div class="wrap">
    <a class="brand" href="index.html" aria-label="OnboardingSA home">
      <svg viewBox="0 0 640 160" xmlns="http://www.w3.org/2000/svg">
        <svg viewBox="0 0 240 240" x="8" y="20" width="120" height="120">
          <rect x="20" y="20" width="200" height="200" rx="46" fill="#12294D"/>
          <path d="M120 56 L160 112 L133 112 L133 168 L107 168 L107 112 L80 112 Z" fill="#E8A33D"/>
          <rect x="76" y="176" width="88" height="14" rx="7" fill="#E8A33D"/>
        </svg>
        <text x="150" y="101" font-family="Poppins,Arial,sans-serif" font-size="60" font-weight="600" letter-spacing="-0.5"><tspan fill="#12294D">Onboarding</tspan><tspan fill="#E8A33D">SA</tspan></text>
      </svg>
    </a>
    <nav class="nav"><a href="about.html">About</a></nav>
  </div>
</header>
<main>
  <div class="wrap">
    <a class="back-link" href="index.html">← All jobs</a>
    <div id="content"><div class="state"><h2>Loading…</h2></div></div>
  </div>
</main>
<footer class="site">
  <div class="wrap">
    <span>© <span id="yr"></span> OnboardingSA · onboardingsa.co.za</span>
    <span><a href="about.html">About</a> &nbsp;·&nbsp; <a href="contact.html">Contact</a> &nbsp;·&nbsp; <a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a></span>
  </div>
</footer>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy-Z3HaB9wPDOljgg7vORWjLhZr-vX8zRUjzsfN972jgdzdnIfFUZqQff2U9bwlv9I4XCnXG1T20xj/pub?output=csv";
document.getElementById('yr').textContent = new Date().getFullYear();
const JOB_ID = new URLSearchParams(location.search).get('id') || '';
function slugify(s){ return (s||'').toString().toLowerCase().trim().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
function makeJobId(row, seen){
  let base=(row.id||'').toString().trim();
  if(!base){ base=slugify((row.job_title||'')+'-'+(row.employer||'')); }
  if(!base){ base='job'; }
  let id=base, n=2;
  while(seen.has(id)){ id=base+'-'+n; n++; }
  seen.add(id);
  return id;
}
function norm(row){
  const g=k=>(row[k]??row[k?.toUpperCase?.()]??'').toString().trim();
  return {
    _rawid:g('id'),
    job_title:g('job_title'), employer:g('employer'), category:g('category'),
    province:g('province'), location:g('location'), employment_type:g('employment_type'),
    salary:g('salary'), posted_date:g('posted_date'), closing_date:g('closing_date'),
    reference_no:g('reference_no'), about_role:g('about_role'),
    responsibilities:g('responsibilities'), requirements:g('requirements'),
    official_apply_url:g('official_apply_url'), featured:g('featured').toLowerCase(),
    logo_url:g('logo_url'), status:g('status').toLowerCase()
  };
}
function daysLeft(d){ if(!d) return null; const ms=new Date(d)-new Date(); if(isNaN(ms)) return null; return Math.ceil(ms/86400000); }
function fmtDate(d){ if(!d) return ''; const t=new Date(d); if(isNaN(t)) return d; return t.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
function initials(name){ return (name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toList(text){ return (text||'').split(/;|\n|•/).map(s=>s.trim()).filter(Boolean); }
const LOGO_BASE="https://raw.githubusercontent.com/onboardingSA-CvkCapital/OnboardingSA/main/";
function logoSlug(name){ return (name||'').trim().replace(/&/g,'and').replace(/[^A-Za-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
function avatarHTML(j){
  const gold=j.featured==='yes'?' gold':'';
  const ini=esc(initials(j.employer));
  const candidates=[];
  const base=logoSlug(j.employer);
  if(base){ for(const nm of [...new Set([base, base.toLowerCase()])]) candidates.push(LOGO_BASE+nm+'.png',LOGO_BASE+nm+'.jpg',LOGO_BASE+nm+'.svg'); }
  if(j.logo_url && /^https?:\/\//i.test(j.logo_url)) candidates.push(j.logo_url);
  if(!candidates.length) return `<div class="avatar${gold}">${ini}</div>`;
  const list=candidates.map(u=>esc(u)).join('|');
  return `<div class="avatar${gold}"><img src="${esc(candidates[0])}" alt="${esc(j.employer)} logo" loading="lazy" data-fallbacks="${list}" data-i="0" data-ini="${ini}" onerror="(function(el){const f=el.getAttribute('data-fallbacks').split('|');let i=+el.getAttribute('data-i')+1;if(i<f.length){el.setAttribute('data-i',i);el.src=f[i];}else{el.parentNode.textContent=el.getAttribute('data-ini');}})(this)"></div>`;
}
function isExpired(d){
  if(!d) return false;
  const end=new Date(d); if(isNaN(end)) return false;
  end.setHours(23,59,59,999);
  return end < new Date();
}
function schema(j){
  const data={"@context":"https://schema.org/","@type":"JobPosting",title:j.job_title,
    description:(j.about_role||'')+' '+(j.requirements||''),
    datePosted:j.posted_date||undefined,validThrough:j.closing_date||undefined,
    employmentType:(j.employment_type||'').toUpperCase().replace(/[^A-Z]/g,'_')||undefined,
    hiringOrganization:{"@type":"Organization",name:j.employer},
    jobLocation:{"@type":"Place",address:{"@type":"PostalAddress",addressLocality:j.location||j.province,addressRegion:j.province,addressCountry:"ZA"}},
    directApply:false};
  const s=document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(data); document.head.appendChild(s);
}
function renderJob(j){
  document.title = `${j.job_title} — ${j.employer} | OnboardingSA`;
  schema(j);
  const resp=toList(j.responsibilities), reqs=toList(j.requirements);
  const dl=daysLeft(j.closing_date), soon=dl!==null&&dl<=7;
  document.getElementById('content').innerHTML=`<div class="detail">
    <div class="d-head">
      ${avatarHTML(j)}
      <div>
        ${j.featured==='yes'?'<div style="font-family:Poppins;font-weight:600;font-size:11px;color:var(--gold-600);margin-bottom:4px">★ FEATURED</div>':''}
        <h1>${esc(j.job_title)}</h1>
        <div class="d-emp">${esc(j.employer)}</div>
        <div class="d-loc">${esc([j.location,j.province].filter(Boolean).join(', '))}</div>
      </div>
    </div>
    <div class="chips">
      ${j.employment_type?`<span class="chip">${esc(j.employment_type)}</span>`:''}
      ${j.salary?`<span class="chip">${esc(j.salary)}</span>`:''}
      ${j.category?`<span class="chip">${esc(j.category)}</span>`:''}
      ${j.closing_date?`<span class="chip ${soon?'close-soon':''}">Closes ${esc(fmtDate(j.closing_date))}${soon&&dl>=0?` · ${dl} days left`:''}</span>`:''}
    </div>
    <div class="actions">
      ${j.official_apply_url?`<a class="apply" href="${esc(j.official_apply_url)}" target="_blank" rel="noopener">Apply on ${esc(j.employer)}'s official site
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></a>`:''}
      <button class="share" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>
        <span id="shareLabel">Share this job</span>
      </button>
    </div>
    ${j.official_apply_url?`<p class="handoff">You'll be taken to ${esc(j.employer)}'s official careers page to apply. OnboardingSA never charges you and never collects your application.</p>`:''}
    ${j.about_role?`<div class="section"><h4>About the role</h4><p>${esc(j.about_role)}</p></div>`:''}
    ${resp.length?`<div class="section"><h4>Responsibilities</h4><ul>${resp.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`:''}
    ${reqs.length?`<div class="section"><h4>Requirements</h4><ul>${reqs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`:''}
    <div class="d-foot">
      ${j.reference_no?`<span>Ref: ${esc(j.reference_no)}</span>`:'<span></span>'}
      ${j.posted_date?`<span>Posted ${esc(fmtDate(j.posted_date))}</span>`:''}
    </div>
  </div>`;
  const btn=document.getElementById('shareBtn');
  btn.addEventListener('click',async()=>{
    const url=location.href;
    const shareData={title:`${j.job_title} at ${j.employer}`,text:`${j.job_title} — ${j.employer}`,url};
    if(navigator.share){ try{ await navigator.share(shareData); return; }catch(e){} }
    try{ await navigator.clipboard.writeText(url); }catch(e){}
    btn.classList.add('copied');
    document.getElementById('shareLabel').textContent='Link copied!';
    setTimeout(()=>{ btn.classList.remove('copied'); document.getElementById('shareLabel').textContent='Share this job'; },2000);
  });
}
function notFound(){
  document.getElementById('content').innerHTML=`<div class="state">
    <h2>Job not found</h2>
    <p>This job may have closed or the link is out of date.</p>
    <p><a href="index.html">← Browse all open jobs</a></p>
  </div>`;
}
function boot(rows){
  if(!JOB_ID){ notFound(); return; }
  const jobs=rows.map(norm)
    .filter(j=>j.job_title && j.status==='live' && !isExpired(j.closing_date));
  let job=jobs.find(j=>(j.reference_no||'').trim()===JOB_ID);
  if(!job) job=jobs.find(j=>(j._rawid||'').trim()===JOB_ID);
  if(!job){
    const seen=new Set();
    jobs.forEach(j=>{ j._gen=makeJobId({job_title:j.job_title,employer:j.employer},seen); });
    job=jobs.find(j=>j._gen===JOB_ID);
  }
  if(job) renderJob(job); else notFound();
}
let booted=false;
function safeBoot(rows){ if(booted) return; booted=true; boot(rows); }
function loadDetail(attempt){
  attempt = attempt || 1;
  try{
    if(typeof Papa==='undefined'){
      if(attempt<=4){ setTimeout(()=>loadDetail(attempt+1),1500); } else { booted=true; notFound(); }
      return;
    }
    Papa.parse(CSV_URL,{download:true,header:true,skipEmptyLines:true,
      complete:r=>{
        const rows=(r&&r.data)||[];
        if(rows.length){ safeBoot(rows); }
        else if(attempt<=4){ setTimeout(()=>loadDetail(attempt+1),1500); }
        else { booted=true; notFound(); }
      },
      error:()=>{
        if(attempt<=4){ setTimeout(()=>loadDetail(attempt+1),1500); } else { booted=true; notFound(); }
      }
    });
  }catch(e){
    if(attempt<=4){ setTimeout(()=>loadDetail(attempt+1),1500); } else { booted=true; notFound(); }
  }
}
loadDetail();
</script>
</body>
</html>
